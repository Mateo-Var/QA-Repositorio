[pytest]
# pytest solo corre los agentes Python y scripts — los E2E Android son Jest/WebdriverIO
# GOT-01: excluir apps/ para no conflictuar con tests que necesitan device físico
testpaths     = tests
norecursedirs = apps node_modules .git __pycache__ .pytest_cache

addopts =
    --cov=agents
    --cov=scripts
    --cov-report=term-missing
    --cov-fail-under=70
    -v
