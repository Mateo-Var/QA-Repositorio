name: QA Agent — Android

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (opcional, para comentar resultados)"
        required: false
        default: "0"

# Permisos globales — permite publicar comentarios en PRs
permissions:
  pull-requests: write
  contents: read

# ── Job 0: Sugerencia Claude (ubuntu, sin dispositivo) ───────────────────────
jobs:
  suggest:
    name: "Fase 0 — Sugerencia Claude"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Sugerencia Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_ID:            ${{ secrets.APP_ID || 'tvnPass' }}
          GH_TOKEN:          ${{ github.token }}
        run: |
          chmod +x scripts/run_suggestion.sh
          ./scripts/run_suggestion.sh \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

# ── Job 1: Unit tests Android (sin dispositivo) ──────────────────────────────
  unit-tests:
    name: "Fase 1 — Unit Tests Android"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS deps
        run: npm install

      - name: Jest Android (helpers)
        run: npm run test:unit

# ── Job 2: E2E Android (self-hosted Mac Mini con Samsung físico) ──────────────
  e2e-android:
    name: "Fase 2 — E2E Android"
    needs: unit-tests
    runs-on: [self-hosted, android]   # Windows ahora / Mac Mini después — mismo label
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Fase 2 — E2E Android
        shell: powershell
        env:
          PR_NUMBER:             ${{ github.event.pull_request.number || github.event.inputs.pr_number || '0' }}
          BASE_SHA:              ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA:              ${{ github.event.pull_request.head.sha || '' }}
          ANDROID_DEVICE_NAME:   ${{ secrets.ANDROID_DEVICE_NAME || 'R5CTB1W92KY' }}
          ANDROID_APP_PACKAGE:   ${{ secrets.ANDROID_APP_PACKAGE || 'com.streann.tvnpass' }}
          ANDROID_APP_ACTIVITY:  ${{ secrets.ANDROID_APP_ACTIVITY || 'com.streann.tvnpass.MainActivity' }}
          APPIUM_SERVER_URL:     ${{ secrets.APPIUM_SERVER_URL || 'http://localhost:4723' }}
          APP_ID:                ${{ secrets.APP_ID || 'tvnPass' }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:              ${{ github.token }}
          APPIUM_HOME:           C:\Users\santi\.appium
          GITHUB_SERVER_URL:     ${{ github.server_url }}
          GITHUB_REPOSITORY:     ${{ github.repository }}
          GITHUB_ACTIONS_RUN_ID: ${{ github.run_id }}
        run: |
          $env:PATH = "C:\Program Files\GitHub CLI\;C:\Program Files\Git\bin;C:\Program Files\Git\usr\bin;" + $env:PATH
          python -m pip install -r requirements.txt --quiet
          if ($env:BASE_SHA -ne '') {
            # PR — flujo completo: Agente 1 + Agente 2 + Agente 3 + tests
            bash scripts/run_on_pr.sh $env:PR_NUMBER $env:BASE_SHA $env:HEAD_SHA
          } else {
            # workflow_dispatch manual — solo tests
            bash scripts/run_android.sh
          }

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports-${{ github.run_id }}
          path: reports/
          retention-days: 14

# Nota: Fase 3 (Validación Visual) corre dentro de run_on_pr.sh en el runner
# self-hosted donde los screenshots están disponibles localmente.
