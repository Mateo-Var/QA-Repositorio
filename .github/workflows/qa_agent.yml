name: QA Agent — Android

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 3 * * *"   # Nightly a las 03:00 UTC
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (opcional, para comentar resultados)"
        required: false
        default: "0"

# Permisos globales — permite publicar comentarios en PRs
permissions:
  pull-requests: write
  contents: read

# ── Job 0: Sugerencia Claude (ubuntu, sin dispositivo) ───────────────────────
jobs:
  suggest:
    name: "Fase 0 — Sugerencia Claude"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Sugerencia Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_ID:            ${{ secrets.APP_ID || 'tvnPass' }}
          GH_TOKEN:          ${{ github.token }}
        run: |
          chmod +x scripts/run_suggestion.sh
          ./scripts/run_suggestion.sh \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

# ── Job 1: Unit tests Android (sin dispositivo) ──────────────────────────────
  unit-tests:
    name: "Fase 1 — Unit Tests Android"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS deps
        run: npm install

      - name: Jest Android (helpers)
        run: npm run test:unit

# ── Job 2: E2E Android (self-hosted Mac Mini con Samsung físico) ──────────────
  e2e-android:
    name: "Fase 2 — E2E Android"
    needs: unit-tests
    runs-on: [self-hosted, android]   # Windows ahora / Mac Mini después — mismo label
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Fase 2 — E2E Android
        shell: powershell
        env:
          PR_NUMBER:             ${{ github.event.pull_request.number || github.event.inputs.pr_number || '0' }}
          BASE_SHA:              ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA:              ${{ github.event.pull_request.head.sha || '' }}
          ANDROID_DEVICE_NAME:   ${{ secrets.ANDROID_DEVICE_NAME || 'R5CTB1W92KY' }}
          ANDROID_APP_PACKAGE:   ${{ secrets.ANDROID_APP_PACKAGE || 'com.streann.tvnpass' }}
          ANDROID_APP_ACTIVITY:  ${{ secrets.ANDROID_APP_ACTIVITY || 'com.streann.tvnpass.MainActivity' }}
          APPIUM_SERVER_URL:     ${{ secrets.APPIUM_SERVER_URL || 'http://localhost:4723' }}
          APP_ID:                ${{ secrets.APP_ID || 'tvnPass' }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:              ${{ github.token }}
        run: |
          $env:PATH = "C:\Program Files\Git\bin;C:\Program Files\Git\usr\bin;" + $env:PATH
          python -m pip install -r requirements.txt --quiet
          if ($env:BASE_SHA -ne '') {
            # PR — flujo completo: Agente 1 + Agente 2 + tests
            bash scripts/run_on_pr.sh $env:PR_NUMBER $env:BASE_SHA $env:HEAD_SHA
          } else {
            # workflow_dispatch manual — solo tests
            bash scripts/run_android.sh
          }

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports-${{ github.run_id }}
          path: reports/
          retention-days: 14

# ── Job 3: Validación Visual Claude ──────────────────────────────────────────
  vision-validate:
    name: "Fase 3 — Validación Visual Claude"
    needs: e2e-android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Download Android reports
        uses: actions/download-artifact@v4
        with:
          name: android-reports-${{ github.run_id }}
          path: reports/
        continue-on-error: true

      - name: Fase 3 — Validación Visual
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_ID:            ${{ secrets.APP_ID || 'tvnPass' }}
          GH_TOKEN:          ${{ github.token }}
        run: |
          AGENT2=$(ls -t /tmp/qa_agent2_output_*.json 2>/dev/null | head -1 || echo "")
          if [[ -z "$AGENT2" ]]; then
            echo "⚠️  No se encontró agent2 output. Skipping Fase 3."
            exit 0
          fi
          RUN_ID=$(basename "$AGENT2" | sed 's/qa_agent2_output_//' | sed 's/\.json//')
          chmod +x scripts/run_vision.sh
          ./scripts/run_vision.sh \
            "${{ github.event.inputs.pr_number || 0 }}" \
            "$AGENT2" \
            "$RUN_ID"

      - name: Upload vision reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vision-reports-${{ github.run_id }}
          path: reports/
          retention-days: 14

# ── Job 4: Nightly Android ────────────────────────────────────────────────────
  nightly:
    name: "Nightly — Android"
    runs-on: [self-hosted, android]   # Windows ahora / Mac Mini después — mismo label
    timeout-minutes: 90
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          npm install

      - name: Unit tests
        run: npm run test:unit

      - name: E2E Android
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          APP_ID:                ${{ secrets.APP_ID || 'tvnPass' }}
          ANDROID_DEVICE_NAME:   ${{ secrets.ANDROID_DEVICE_NAME }}
          ANDROID_APP_PACKAGE:   ${{ secrets.ANDROID_APP_PACKAGE }}
          ANDROID_APP_ACTIVITY:  ${{ secrets.ANDROID_APP_ACTIVITY }}
          APPIUM_SERVER_URL:     http://localhost:4723
        run: |
          chmod +x scripts/run_android.sh
          APP_ID="${APP_ID}" bash scripts/run_android.sh

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reports-${{ github.run_id }}
          path: reports/
          retention-days: 14

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"text":"QA Agent Android: fallo en run nightly ${{ github.run_id }}"}'
