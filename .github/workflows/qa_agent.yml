name: QA Agent — Android + iOS

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (opcional, para comentar resultados)"
        required: false
        default: "0"

# Permisos globales
permissions:
  pull-requests: write
  contents: write    # necesario para git push a gh-pages desde el runner

# ── Job 0: Sugerencia Claude (ubuntu, sin dispositivo) ───────────────────────
jobs:
  suggest:
    name: "Fase 0 — Sugerencia Claude"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Sugerencia Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_ID:            ${{ secrets.APP_ID || 'tvnPass' }}
          GH_TOKEN:          ${{ github.token }}
        run: |
          chmod +x scripts/run_suggestion.sh
          ./scripts/run_suggestion.sh \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

# ── Job 1: Unit tests Android (sin dispositivo) ──────────────────────────────
  unit-tests:
    name: "Fase 1 — Unit Tests Android"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS deps
        run: npm install

      - name: Jest Android (helpers)
        run: npm run test:unit

# ── Job 2: E2E Android (self-hosted Mac Mini con Samsung físico) ──────────────
  e2e-android:
    name: "Fase 2 — E2E Android"
    needs: unit-tests
    runs-on: [self-hosted, android]   # Windows ahora / Mac Mini después — mismo label
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Fase 2 — E2E Android
        shell: bash
        env:
          PR_NUMBER:             ${{ github.event.pull_request.number || github.event.inputs.pr_number || '0' }}
          BASE_SHA:              ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA:              ${{ github.event.pull_request.head.sha || '' }}
          ANDROID_DEVICE_NAME:   ${{ secrets.ANDROID_DEVICE_NAME || 'R5CTB1W92KY' }}
          ANDROID_APP_PACKAGE:   ${{ secrets.ANDROID_APP_PACKAGE || 'com.streann.tvnpass' }}
          ANDROID_APP_ACTIVITY:  ${{ secrets.ANDROID_APP_ACTIVITY || 'com.streann.tvnpass.MainActivity' }}
          APPIUM_SERVER_URL:     ${{ secrets.APPIUM_SERVER_URL || 'http://localhost:4723' }}
          APP_ID:                ${{ secrets.APP_ID || 'tvnPass' }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:              ${{ github.token }}
          GITHUB_SERVER_URL:     ${{ github.server_url }}
          GITHUB_REPOSITORY:     ${{ github.repository }}
          GITHUB_ACTIONS_RUN_ID: ${{ github.run_id }}
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          export APPIUM_HOME="$HOME/.appium"
          python -m pip install -r requirements.txt --quiet
          if [[ -n "$BASE_SHA" ]]; then
            # PR — flujo completo: Agente 1 + Agente 2 + Agente 3 + tests
            bash scripts/run_on_pr.sh "$PR_NUMBER" "$BASE_SHA" "$HEAD_SHA"
          else
            # workflow_dispatch manual — solo tests
            bash scripts/run_android.sh
          fi

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports-${{ github.run_id }}
          path: reports/
          retention-days: 14

# ── Job 3: E2E iOS (self-hosted Mac Mini con iPhone físico) ──────────────────
  e2e-ios:
    name: "Fase 2 — E2E iOS"
    needs: unit-tests
    runs-on: [self-hosted, ios]
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Fase 2 — E2E iOS
        shell: bash
        env:
          APP_PLATFORM:          ios
          APP_ID:                ${{ secrets.APP_ID || 'tvnPass' }}
          IOS_DEVICE_UDID:       ${{ secrets.IOS_DEVICE_UDID || '00008140-00045DCE3422801C' }}
          IOS_BUNDLE_ID:         ${{ secrets.IOS_BUNDLE_ID || 'com.tvn-2.appletv' }}
          IOS_TEAM_ID:           ${{ secrets.IOS_TEAM_ID || '8KW4872JND' }}
          IOS_APPIUM_SERVER_URL: http://localhost:4724
          GH_TOKEN:              ${{ github.token }}
          GITHUB_SERVER_URL:     ${{ github.server_url }}
          GITHUB_REPOSITORY:     ${{ github.repository }}
          GITHUB_ACTIONS_RUN_ID: ${{ github.run_id }}
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          export APPIUM_HOME="$HOME/.appium"
          python3 -m pip install -r requirements.txt --quiet
          chmod +x scripts/run_ios.sh
          bash scripts/run_ios.sh "${{ github.event.pull_request.number || '0' }}"

      - name: Upload iOS reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-reports-${{ github.run_id }}
          path: reports/
          retention-days: 14

# Nota: Fase 3 (Validación Visual) corre dentro de run_on_pr.sh en el runner
# self-hosted donde los screenshots están disponibles localmente.
# Nota: Fase 4 (Allure + GitHub Pages) corre dentro de onComplete en wdio.conf.js
# via scripts/publish-report.js — publica después de cada run, guarda historial.
