name: UI Drift Detection — Semanal

# Corre cada lunes a las 8AM UTC.
# Detecta si el cliente cambió la UI via plataforma (sin PR de código).
# Por cada app: regenera ui_map, compara, lanza E2E solo si algo cambió.
on:
  schedule:
    - cron: '0 8 * * 1'   # Lunes 8AM UTC
  workflow_dispatch:        # trigger manual para testing

permissions:
  contents: write    # para commitear ui_map actualizado
  issues: write      # para crear issue si E2E falla tras drift

jobs:
  detect-drift:
    name: "Detectar drift UI — todas las apps"
    runs-on: [self-hosted, android]
    timeout-minutes: 120   # máx 2h para todas las apps secuencialmente

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS deps
        run: npm install

      - name: Install Python deps
        run: python -m pip install -r requirements.txt --quiet

      - name: Configurar git para commits automáticos
        run: |
          git config user.email "qa-agent@mediastream.com"
          git config user.name  "QA Agent"

      - name: Detectar drift UI — todas las apps
        shell: bash
        env:
          ANDROID_DEVICE_NAME:   ${{ secrets.ANDROID_DEVICE_NAME || 'fy9tgmv4kbtox4mj' }}
          ANDROID_APP_PACKAGE:   ${{ secrets.ANDROID_APP_PACKAGE || 'com.streann.tvnpass' }}
          ANDROID_APP_ACTIVITY:  ${{ secrets.ANDROID_APP_ACTIVITY || 'com.streann.tvnpass.MainActivity' }}
          APPIUM_SERVER_URL:     ${{ secrets.APPIUM_SERVER_URL || 'http://localhost:4723' }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:              ${{ github.token }}
          GITHUB_REPOSITORY:     ${{ github.repository }}
        run: |
          export APPIUM_HOME="$HOME/.appium"
          bash scripts/detect_ui_drift.sh

      - name: Push ui_maps actualizados (si los hubo)
        if: always()
        run: |
          git push origin HEAD || echo "Nada que pushear"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-reports-${{ github.run_id }}
          path: reports/
          retention-days: 14
